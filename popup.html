<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Notes</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f14;
      --card: #121821;
      --card-2: #171e28;
      --border: rgba(255, 255, 255, 0.08);
      --text: #f3f4f6;
      --muted: #9ca3af;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --danger: #dc2626;
      --danger-hover: #b91c1c;
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 380px;
      padding: 16px;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }

    h1, h2 {
      margin: 0 0 14px 0;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .domain {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 14px;
      word-break: break-word;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #0f141c;
      color: var(--text);
      padding: 12px;
      font: inherit;
      outline: none;
    }

    textarea:focus {
      border-color: rgba(37, 99, 235, 0.6);
    }

    textarea::placeholder {
      color: var(--muted);
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      flex: 1;
      border: 0;
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .save-btn {
      background: var(--accent);
      color: white;
    }

    .save-btn:hover {
      background: var(--accent-hover);
    }

    .delete-btn {
      background: var(--danger);
      color: white;
    }

    .delete-btn:hover {
      background: var(--danger-hover);
    }

    .status {
      min-height: 18px;
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .empty {
      font-size: 13px;
      color: var(--muted);
    }

    .note-item {
      background: var(--card-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      margin-top: 8px;
    }

    .note-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }

    .note-domain {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      word-break: break-word;
      flex: 1;
    }

    .note-text {
      font-size: 13px;
      line-height: 1.45;
      color: #d1d5db;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .note-delete-btn {
      flex: 0 0 auto;
      background: transparent;
      border: 1px solid rgba(220, 38, 38, 0.35);
      color: #fca5a5;
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .note-delete-btn:hover {
      background: rgba(220, 38, 38, 0.12);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Site Notes</h1>

    <div class="label">Текущий сайт</div>
    <div id="currentDomain" class="domain">Определяю...</div>

    <div class="label">Заметка для этого сайта</div>
    <textarea id="noteInput" placeholder="Напиши заметку для текущего сайта..."></textarea>

    <div class="buttons">
      <button id="saveBtn" class="save-btn">Сохранить</button>
      <button id="deleteBtn" class="delete-btn">Удалить</button>
    </div>

    <div id="status" class="status"></div>
  </div>

  <div class="card">
    <h2>Все заметки</h2>
    <div id="notesList" class="empty">Пока заметок нет.</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
